# =============================================================================
# DeepCue — Local Development Infrastructure
#
# Provides: Redis (Celery broker + Channels layer) and MongoDB (Atlas stand-in)
# Django, Daphne, and Celery workers are run directly on the host (not here).
#
# Usage:
#   docker compose up -d          # start all services in background
#   docker compose down           # stop and remove containers
#   docker compose down -v        # also wipe persistent volumes
#
# Local MongoDB URI (put this in your .env for local dev):
#   MONGODB_URI=mongodb://deepcue:deepcue_local@localhost:27017/deepcue?authSource=admin
#
# Switch back to Atlas for production by replacing MONGODB_URI in .env.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Redis — broker (Celery), result backend, and Channels layer
  # Three logical databases (DB 0/1/2) match the .env.example split.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: deepcue_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # MongoDB — local Atlas stand-in for development
  # Replica set is NOT configured here; if you need change streams locally,
  # upgrade this to a single-node replica set (mongo --replSet rs0).
  # ---------------------------------------------------------------------------
  mongodb:
    image: mongo:7.0
    container_name: deepcue_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: deepcue
      MONGO_INITDB_ROOT_PASSWORD: deepcue_local
      MONGO_INITDB_DATABASE: deepcue
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Mongo Express — browser UI for inspecting session/emotion documents
  # Access at: http://localhost:8081
  # No auth in dev (ME_CONFIG_BASICAUTH: false). Do not expose in production.
  # ---------------------------------------------------------------------------
  mongo-express:
    image: mongo-express:1.0.2-20
    container_name: deepcue_mongo_express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: deepcue
      ME_CONFIG_MONGODB_ADMINPASSWORD: deepcue_local
      ME_CONFIG_MONGODB_URL: mongodb://deepcue:deepcue_local@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongodb:
        condition: service_healthy

# -----------------------------------------------------------------------------
# Named volumes — persist data across container restarts
# -----------------------------------------------------------------------------
volumes:
  redis_data:
  mongo_data:
